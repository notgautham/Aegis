name: Python Lint (Ruff)

on:
  push:
    branches: [ "main" ]
    paths:
      - 'backend/**'
      - 'tests/**'
      - 'scripts/**'
      - 'simulation/**'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'backend/**'
      - 'tests/**'
      - 'scripts/**'
      - 'simulation/**'

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      
      - name: Install ruff
        run: pip install ruff
        
      - name: Run Ruff Linter
        run: ruff check backend tests scripts simulation migrations
        
      - name: Run Ruff Formatter check
        run: ruff format --check backend tests scripts simulation migrations
