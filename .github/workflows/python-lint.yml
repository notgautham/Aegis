name: Python Lint (Ruff)

on:
  push:
    branches: [ "main" ]
    paths:
      - 'backend/**'
      - 'tests/**'
      - 'scripts/**'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'backend/**'
      - 'tests/**'
      - 'scripts/**'

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install ruff
        run: pip install ruff
        
      - name: Run Ruff Linter
        run: ruff check .
        
      - name: Run Ruff Formatter check
        run: ruff format --check .
