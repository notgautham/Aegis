name: Backend CI

on:
  push:
    branches: [ "main" ]
    paths:
      - 'backend/**'
      - 'tests/**'
      - 'requirements.txt'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'backend/**'
      - 'tests/**'
      - 'requirements.txt'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Start Database and Qdrant Services
        run: docker compose up -d postgres qdrant

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx

      - name: Wait for services to be healthy
        run: |
          sleep 5
          docker compose ps

      - name: Run Database Migrations
        run: |
          alembic upgrade head
        env:
          DATABASE_URL: postgresql+asyncpg://aegis:aegis@localhost:5432/aegis

      - name: Run tests (Unit & Integration)
        run: |
          pytest tests/unit tests/integration -v
        env:
          PYTHONPATH: .
          DATABASE_URL: postgresql+asyncpg://aegis:aegis@localhost:5432/aegis
          QDRANT_URL: http://localhost:6333
          # Enforce local/offline modes in CI so tests don't require cloud API keys.
          EMBEDDING_PROVIDER_MODE: local
          LLM_PROVIDER_MODE: local
