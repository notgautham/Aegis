version: "3.9"

services:
  # ── FastAPI Backend (OQS-patched OpenSSL) ─────────────
  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.oqs
    container_name: aegis-backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://aegis:aegis@postgres:5432/aegis
      - QDRANT_URL=http://qdrant:6333
      - SECRET_KEY=dev-secret-key-change-in-production
      - PROJECT_NAME=Aegis
      - API_V1_STR=/api/v1
    volumes:
      - .:/app
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
    restart: unless-stopped

  # ── PostgreSQL 15 ─────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: aegis-postgres
    environment:
      POSTGRES_USER: aegis
      POSTGRES_PASSWORD: aegis
      POSTGRES_DB: aegis
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aegis"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Qdrant Vector Database ───────────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    container_name: aegis-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

volumes:
  pgdata:
  qdrant_data:
