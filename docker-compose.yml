services:
  # ── Aegis Backend (OQS Intelligence Engine) ─────────────
  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.oqs
    container_name: aegis-backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://aegis:aegis@postgres:5432/aegis
      - QDRANT_URL=http://qdrant:6333
      - SECRET_KEY=dev-secret-key-change-in-production
      - PROJECT_NAME=Aegis
      - API_V1_STR=/api/v1
    volumes:
      - .:/app
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
    restart: unless-stopped

  # ── Aegis Frontend (React + Vite Dev Server) ─────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: aegis-frontend
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 8080"
    ports:
      - "3000:8080"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    restart: unless-stopped

  # ── Apache AGE (Graph + PostgreSQL 15) ─────────────────────────────────────
  postgres:
    image: apache/age:release_PG15_1.6.0
    container_name: aegis-postgres
    environment:
      POSTGRES_USER: aegis
      POSTGRES_PASSWORD: aegis
      POSTGRES_DB: aegis
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/init-age.sql:/docker-entrypoint-initdb.d/init-age.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aegis"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Qdrant Vector Database ───────────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    container_name: aegis-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4
    container_name: aegis-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@aegis.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    restart: unless-stopped

volumes:
  pgdata:
  qdrant_data:
